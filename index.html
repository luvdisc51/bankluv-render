<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BankLuv</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="customer-shell">
      <header class="customer-hero">
        <div class="brand">
          <span class="brand-mark">BL</span>
          <div>
            <h1>BankLuv</h1>
            <p>Very good Banking</p>
          </div>
        </div>
      </header>

      <section class="panel launcher-panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Choose an app</p>
            <h3>BankLuv Apps</h3>
          </div>
        </div>
        <div class="launcher-grid">
          <a class="launcher-link" href="/manager">Manager</a>
          <a class="launcher-link" href="/checkout">Checkout</a>
          <a class="launcher-link" href="/customer">Customer</a>
        </div>
      </section>
    </main>
